name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate Smart Writeup and Update README
        id: script
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import json
          from datetime import datetime

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")
          current_date = datetime.now().strftime('%Y-%m-%d')

          # Формируем жесткий и понятный промпт для ИИ без использования кавычек внутри строки
          prompt_content = (
              f"You are an Expert Cyber Security Analyst. Generate a detailed, highly technical "
              f"Markdown writeup for the TryHackMe room '{room_name}'.\n"
              f"Metadata: Type={room_type}, Difficulty={room_diff}, Date={current_date}.\n\n"
              f"Task: Based on the raw room dump text provided below, extract ALL important parts: "
              f"tasks, sub-tasks, questions, answers (redact them as THM{{REDACTED}}), logs, alert fields, "
              f"investigation steps, and code snippets. Do NOT write generic summaries. Structure it like "
              f"a real, completed walkthough or CTF report. Output ONLY clean markdown starting with # TryHackMe.\n\n"
              f"--- RAW ROOM DUMP ---\n{room_dump}"
          )

          # Базовый аварийный контент (если сеть совсем упадет)
          fallback_content = f"# TryHackMe: {room_name}\n\n| Metadata | Value |\n| --- | --- |\n| **Date** | {current_date} |\n\n## Analysis Failed\nAI request blocked."

          result = None
          
          try:
              print("[*] Connecting to stable Llama-3 generation cluster...")
              # Используем Pollinations, но через чистый POST-запрос к проверенной модели qwen-coder/llama
              response = requests.post(
                  "https://text.pollinations.ai/",
                  json={
                      "messages": [
                          {"role": "user", "content": prompt_content}
                      ],
                      "model": "qwen-coder",
                      "jsonMode": False
                  },
                  timeout=60
              )
              
              if response.status_code == 200 and len(response.text) > 300:
                  result = response.text
                  print("[+] Success! Real AI writeup generated.")
          except Exception as e:
              print(f"[-] AI connection failed: {e}")

          if not result:
              result = fallback_content

          # Очистка имени файла
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f"filename={filename}\n")
          EOF

      - name: Update README Table
        run: |
          python3 - << 'EOF'
          import os
          from datetime import datetime

          room = os.getenv("ROOM")
          filename = os.getenv("FILENAME")
          r_type = os.getenv("R_TYPE")
          diff = os.getenv("DIFF")
          current_date = datetime.now().strftime('%Y-%m-%d')

          new_row = f"| {current_date} | [{room}]({filename}) | `TryHackMe` | `{r_type}` | `{diff}` | ✅ Completed |"
          readme_path = "README.md"

          if not os.path.exists(readme_path):
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write("# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |\n")

          with open(readme_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          inserted = False
          for i, line in enumerate(lines):
              if "| --- |" in line:
                  lines.insert(i + 1, new_row + "\n")
                  inserted = True
                  break

          if not inserted:
              lines.append("\n" + new_row + "\n")

          with open(readme_path, "w", encoding="utf-8") as f:
              f.writelines(lines)
          EOF
        env:
          ROOM: ${{ github.event.inputs.room_name }}
          FILENAME: ${{ steps.script.outputs.filename }}
          R_TYPE: ${{ github.event.inputs.room_type == 'CTF (Challenge)' && 'CTF' || 'Walkthrough' }}
          DIFF: ${{ github.event.inputs.difficulty }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI smart writeup for ${{ github.event.inputs.room_name }}" || echo "No changes to commit"
          git push
