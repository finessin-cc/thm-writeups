name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate Smart Writeup and Update README
        id: script
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import json
          from datetime import datetime

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")
          current_date = datetime.now().strftime('%Y-%m-%d')

          system_instruction = (
              "You are an advanced Cybersecurity Analyst and Technical Writer. Your task is to write a highly detailed, "
              "comprehensive, and professional TryHackMe room writeup based on the provided raw text dump. "
              "Do not use generic templates or placeholders like 'Summary of topics'. Instead, look at the logs, "
              "questions, or descriptions inside the raw text and write real summaries, commands, and analytical notes. "
              "Format everything cleanly using Markdown tables, headers, and code blocks. "
              "Keep all flags or sensitive answers redacted using placeholders like THM{REDACTED}."
          )

          prompt = f"Write a complete, detailed Markdown writeup for the TryHackMe room: '{room_name}'. Classification: {room_type}, Level: {room_diff}, Date: {current_date}. Extract as much context, technical data, and structured task analysis as possible from this dump:\n\n{room_dump}"

          # Локальный качественный шаблон на случай сбоя сети
          fallback_content = f"# TryHackMe: {room_name}\n\n| Metadata | Value |\n| :--- | :--- |\n| **Platform** | [TryHackMe](https://tryhackme.com/) |\n| **Type** | {room_type} |\n| **Difficulty** | {room_diff} |\n| **Date** | {current_date} |\n\n## 🔍 Analysis & Notes\nReview the room content manually. Text analysis engine completed with standard output."

          result = None
          
          # Отправляем запрос через открытый стабильный прокси-интерфейс
          try:
              print("[*] Sending request to the AI cluster...")
              response = requests.post(
                  "https://text.pollinations.ai/",
                  json={
                      "messages": [
                          {"role": "system", "content": system_instruction},
                          {"role": "user", "content": prompt}
                      ],
                      "model": "openai"
                  },
                  timeout=30
              )
              if response.status_code == 200 and len(response.text) > 100:
                  result = response.text
                  print("[+] AI successfully synthesized a custom writeup!")
          except Exception as e:
              print(f"[-] AI request failed ({e}). Using robust fallback blueprint.")

          if not result:
              result = fallback_content

          # Формируем имя файла
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)

          # Передаем имя файла в вывод шага
          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f"filename={filename}\n")
          EOF

      - name: Update README Table
        run: |
          python3 - << 'EOF'
          import os
          from datetime import datetime

          room = os.getenv("ROOM")
          filename = os.getenv("FILENAME")
          r_type = os.getenv("R_TYPE")
          diff = os.getenv("DIFF")
          current_date = datetime.now().strftime('%Y-%m-%d')

          new_row = f"| {current_date} | [{room}]({filename}) | `TryHackMe` | `{r_type}` | `{diff}` | ✅ Completed |"
          readme_path = "README.md"

          if not os.path.exists(readme_path):
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write("# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |\n")

          with open(readme_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          inserted = False
          for i, line in enumerate(lines):
              if "| --- |" in line:
                  lines.insert(i + 1, new_row + "\n")
                  inserted = True
                  break

          if not inserted:
              lines.append("\n" + new_row + "\n")

          with open(readme_path, "w", encoding="utf-8") as f:
              f.writelines(lines)
          print("[+] README.md successfully updated!")
          EOF
        env:
          ROOM: ${{ github.event.inputs.room_name }}
          FILENAME: ${{ steps.script.outputs.filename }}
          R_TYPE: ${{ github.event.inputs.room_type == 'CTF (Challenge)' && 'CTF' || 'Walkthrough' }}
          DIFF: ${{ github.event.inputs.difficulty }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated writeup from GitHub Actions" || echo "No changes to commit"
          git push
