name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate Writeup and Update README
        id: script
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from datetime import datetime

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")
          current_date = datetime.now().strftime('%Y-%m-%d')

          # 1. ГЕНЕРИРУЕМ ДЕФОЛТНЫЙ ШАБЛОН (НА СЛУЧАЙ ЕСЛИ ИИ ЛЕЖИТ)
          if room_type == "CTF (Challenge)":
              fallback_content = f"""# TryHackMe: {room_name} (CTF)

          | Metadata | Value |
          | :--- | :--- |
          | **Platform** | [TryHackMe](https://tryhackme.com/) |
          | **Room Type** | `CTF / Challenge` |
          | **Difficulty** | `{room_diff}` |
          | **Date Completed** | {current_date} |

          ---

          ## 📝 Executive Summary
          This writeup covers the penetration testing methodology used to compromise the **{room_name}** machine.

          ## 🔍 Phase 1: Reconnaissance & Enumeration
          ```bash
          # Run active port scanning
          nmap -sC -sV -oN nmap_report TARGET_IP
          ```

          ## 🚀 Phase 2: Exploitation
          > 🚩 **User Flag:** `THM{{REDACTED_USER_FLAG}}`

          ## 👑 Phase 3: Privilege Escalation
          > 🚩 **Root Flag:** `THM{{REDACTED_ROOT_FLAG}}`
          """
          else:
              fallback_content = f"""# TryHackMe: {room_name} (Walkthrough)

          | Metadata | Value |
          | :--- | :--- |
          | **Platform** | [TryHackMe](https://tryhackme.com/) |
          | **Room Type** | `Walkthrough / Guided` |
          | **Difficulty** | `{room_diff}` |
          | **Date Completed** | {current_date} |

          ---

          ## 📖 Room Overview
          The **{room_name}** room is a guided educational walkthrough.

          ## 🧭 Guided Tasks & Notes
          ### 📑 Task 1: Overview & Lab Setup
          * Summary of topics covered in the room text.

          ### 📑 Task 2: Core Concepts
          * **Question/Flag:** `THM{{REDACTED_TASK_FLAG}}`
          """

          prompt = f"Write a clean, professional markdown writeup for TryHackMe room '{room_name}' ({room_type}, {room_diff}). Use the following text dump from the room to extract key steps, commands, and notes. Output only the markdown without codeblock wraps. Dump:\n{room_dump}"

          result = fallback_content
          print("[*] Trying to contact Free AI service...")
          
          try:
              response = requests.post(
                  "https://open-ai-proxy.example.com/v1/chat/completions",
                  headers={"Content-Type": "application/json"},
                  json={"model": "gpt-4o-mini", "messages": [{"role": "user", "content": prompt}]},
                  timeout=5
              )
              if response.status_code == 200:
                  result = response.json()["choices"][0]["message"]["content"]
                  print("[+] AI successfully generated the writeup!")
          except Exception as e:
              print(f"[!] AI Endpoint down or timed out ({e}). Using robust built-in template.")

          # 2. СОХРАНЯЕМ ВРАЙТАП В КОРЕНЬ
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)
          print(f"[+] File saved as {filename}")

          # 3. ОБНОВЛЯЕМ README.MD ЧЕРЕЗ PYTHON (ЗАМЕНА СТАРЫХ КОРЯВЫХ BASH КОМАНД)
          r_type = "CTF" if room_type == "CTF (Challenge)" else "Walkthrough"
          new_row = f"| {current_date} | [{room_name}]({filename}) | `TryHackMe` | `{r_type}` | `{room_diff}` | ✅ Completed |"

          readme_path = "README.md"
          if not os.path.exists(readme_path):
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write("# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |\n")

          with open(readme_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          # Находим строку с разделителем таблицы и вставляем запись сразу под ней
          inserted = False
          for i, line in enumerate(lines):
              if "| --- |" in line:
                  lines.insert(i + 1, new_row + "\n")
                  inserted = True
                  break

          if not inserted:
              lines.append("\n" + new_row + "\n")

          with open(readme_path, "w", encoding="utf-8") as f:
              f.writelines(lines)
          print("[+] README.md successfully updated!")
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated writeup from GitHub Actions" || echo "No changes to commit"
          git push
