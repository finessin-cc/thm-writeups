name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate Smart Writeup and Update README
        id: script
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import json
          from datetime import datetime

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")
          current_date = datetime.now().strftime('%Y-%m-%d')

          # Инструкции, заставляющие ИИ генерировать глубокий разбор, а не отписку
          system_context = (
              "You are an elite Cyber Security Technical Writer. Write an extensive, professional, "
              "and highly technical TryHackMe room writeup based *only* on the provided raw data dump. "
              "Incorporate logs, alert details, analysis steps, and real technical concepts found in the text. "
              "Do not use generic sentences like 'Review logs manually'. Break everything down into tasks "
              "with real extracted content. Use markdown tables, codeblocks, and bold text. Redact flags as THM{REDACTED}."
          )

          user_prompt = (
              f"Create a deep technical markdown writeup for TryHackMe room: '{room_name}'.\n"
              f"Type: {room_type}, Difficulty: {room_diff}, Date: {current_date}.\n"
              f"Extract every piece of analytical data, steps, alerts, or questions from this raw dump:\n\n"
              f"{room_dump}"
          )

          # Качественный развернутый шаблон на экстренный случай
          fallback_content = f"""# TryHackMe: {room_name}

          | Metadata | Value |
          | :--- | :--- |
          | **Platform** | [TryHackMe](https://tryhackme.com/) |
          | **Room Type** | `{room_type}` |
          | **Difficulty** | `{room_diff}` |
          | **Date Completed** | {current_date} |

          ---

          ## 🔍 Technical Analysis & Investigation
          The core objective of the **{room_name}** infrastructure assessment is to analyze indicators of compromise (IoCs), triage deployment logs, and document the defensive or offensive mechanisms outlined in the guided tasks.

          ## 🛠️ Extracted Room Mechanics & Notes
          * **Operational Architecture:** Review the internal networks, service daemons, and endpoint configurations provided during the runtime lab.
          * **Incident Response Pipeline:** Analyzing alerting logic, log structures, and mitigation techniques to solve the scenario.

          ## 🏁 Flag Reference Matrix
          > 🚩 **Task Indicator:** `THM{{REDACTED_VERIFY_VIA_LAB}}`
          """

          result = None
          
          try:
              print("[*] Contacting the high-speed AI generation cluster...")
              # Используем надёжный endpoint Pollinations с моделью Mistral/Llama для ИТ-документации
              response = requests.post(
                  "https://text.pollinations.ai/",
                  json={
                      "messages": [
                          {"role": "system", "content": system_context},
                          {"role": "user", "content": user_prompt}
                      ],
                      "model": "mistral"
                  },
                  timeout=45
              )
              if response.status_code == 200 and len(response.text) > 200:
                  result = response.text
                  print("[+] AI successfully parsed the dump and built a rich writeup!")
          except Exception as e:
              print(f"[-] AI cluster generation timed out ({e}). Using structural blueprint.")

          if not result:
              result = fallback_content

          # Форматируем имя файла в безопасный вид
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f"filename={filename}\n")
          EOF

      - name: Update README Table
        run: |
          python3 - << 'EOF'
          import os
          from datetime import datetime

          room = os.getenv("ROOM")
          filename = os.getenv("FILENAME")
          r_type = os.getenv("R_TYPE")
          diff = os.getenv("DIFF")
          current_date = datetime.now().strftime('%Y-%m-%d')

          new_row = f"| {current_date} | [{room}]({filename}) | `TryHackMe` | `{r_type}` | `{diff}` | ✅ Completed |"
          readme_path = "README.md"

          if not os.path.exists(readme_path):
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write("# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |\n")

          with open(readme_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          inserted = False
          for i, line in enumerate(lines):
              if "| --- |" in line:
                  lines.insert(i + 1, new_row + "\n")
                  inserted = True
                  break

          if not inserted:
              lines.append("\n" + new_row + "\n")

          with open(readme_path, "w", encoding="utf-8") as f:
              f.writelines(lines)
          print("[+] README.md table sync completed.")
          EOF
        env:
          ROOM: ${{ github.event.inputs.room_name }}
          FILENAME: ${{ steps.script.outputs.filename }}
          R_TYPE: ${{ github.event.inputs.room_type == 'CTF (Challenge)' && 'CTF' || 'Walkthrough' }}
          DIFF: ${{ github.event.inputs.difficulty }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated writeup from GitHub Actions" || echo "No changes to commit"
          git push
