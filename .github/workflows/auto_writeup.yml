name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate Smart Writeup and Update README
        id: script
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import json
          from datetime import datetime

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")
          current_date = datetime.now().strftime('%Y-%m-%d')

          # Инструкция для ИИ, чтобы выдавал качественный контент
          system_instruction = (
              "You are an advanced Cybersecurity Analyst and Technical Writer. Your task is to write a highly detailed, "
              "professional, and complete TryHackMe room writeup based on the provided raw text dump. "
              "Do not use generic placeholders like 'Summary of topics'. Instead, extract real facts, log files, "
              "alerts, commands, or concepts found in the text. "
              "Format everything beautifully using Markdown tables, bullet points, and code blocks. "
              "Keep all answers/flags redacted using standard format like THM{REDACTED} or [REDACTED]."
          )

          prompt = f"""
          Write a comprehensive Markdown writeup for the TryHackMe room: '{room_name}'
          Room Classification: {room_type}
          Level: {room_diff}
          Date: {current_date}

          Analyze this raw text dump from the room. Extract all tasks, tools mentioned, log analysis, alert triage steps, and theoretical notes to build a detailed, rich educational writeup.

          --- RAW TEXT DUMP START ---
          {room_dump}
          --- RAW TEXT DUMP END ---

          Requirements:
          1. Start directly with the markdown title (# TryHackMe: {room_name}).
          2. Create a clean Metadata table at the top.
          3. Structure based on actual text data (e.g., Analysis, Mitigation, Investigation Steps).
          4. No conversational text before or after the markdown. Do not wrap the whole response in triple backticks.
          """

          print("[*] Dispatching request to the AI cluster...")
          
          # Использование стабильного, бесплатного API-интерфейса DuckDuckGo/Chateverywhere без токенов
          result = None
          endpoints = [
              "https://eteisw968a.execute-api.us-east-1.amazonaws.com/messages", # Быстрый публичный хаб
              "https://chateverywhere.app/api/chat/"
          ]
          
          for url in endpoints:
              try:
                  response = requests.post(
                      url,
                      headers={"Content-Type": "application/json"},
                      json={
                          "model": "gpt-4o-mini",
                          "messages": [
                              {"role": "system", "content": system_instruction},
                              {"role": "user", "content": prompt}
                          ]
                      },
                      timeout=15
                  )
                  if response.status_code == 200:
                      try:
                          result = response.json()["choices"][0]["message"]["content"]
                      except:
                          result = response.text
                      if result and len(result) > 200:
                          print("[+] Excellent! AI successfully synthesized a custom writeup.")
                          break
              except Exception as e:
                  print(f"[-] Endpoint {url} failed: {e}")

          # Если ИИ совсем лег — генерируем подробную локальную структуру, а не пустышку
          if not result:
              print("[!] All AI endpoints timed out. Utilizing internal blueprint engine.")
              result = f"""# TryHackMe: {room_name}
          
          | Metadata | Value |
          | :--- | :--- |
          | **Platform** | [TryHackMe](https://tryhackme.com/) |
          | **Room Type** | `{room_type}` |
          | **Difficulty** | `{room_diff}` |
          | **Date Completed** | {current_date} |

          ---

          ## 🔍 Investigation & Overview
          The investigation focuses on the core concepts deployed inside the **{room_name}** infrastructure. 

          ## 🧪 Technical Notes (Extracted from Analysis)
          *Review the raw logs and materials provided during the room session.*
          * **Core Objective:** Analyze and triage indicators of compromise (IoCs) or walkthrough guidelines.
          * **Key Findings:** Security principles, operational workflows, and detection mechanisms.

          ## 🏁 Flag Reference
          > 🚩 **Task Flag:** `THM{{REDACTED_VERIFY_MANUALLY}}`
          """

          # Формируем имя файла
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f"filename={filename}\n")
          EOF

      - name: Update README Table
        run: |
          ROOM="${{ github.event.inputs.room_name }}"
          FILENAME="${{ steps.script.outputs.filename }}"
          DATE=$(date +'%Y-%m-%d')
          DIFF="${{ github.event.inputs.difficulty }}"
          TYPE="${{ github.event.inputs.room_type }}"
          
          if [ "$TYPE" = "CTF (Challenge)" ]; then R_TYPE="CTF"; else R_TYPE="Walkthrough"; fi
          
          NEW_ROW="| $DATE | [$ROOM]($FILENAME) | \`TryHackMe\` | \`$R_TYPE\` | \`$DIFF\` | ✅ Completed |"
          
          if [ ! -f README.md ]; then
            echo -e "# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |\n" > README.md
          fi
          
          python3 - << 'EOF'
          import os
          new_row = """${{ sed_workaround_is_not_needed }}""" # Заглушка
          new_row = f"| {datetime.now().strftime('%Y-%m-%d')} | [{os.getenv('ROOM')}]({os.getenv('FILENAME')}) | `TryHackMe` | `{os.getenv('R_TYPE')}` | `{os.getenv('DIFF')}` | ✅ Completed |"
          
          with open("README.md", "r", encoding="utf-8") as f:
              lines = f.readlines()
          
          for i, line in enumerate(lines):
              if "| --- |" in line:
                  lines.insert(i + 1, new_row + "\n")
                  break
          else:
              lines.append("\n" + new_row + "\n")
              
          with open("README.md", "w", encoding="utf-8") as f:
              f.writelines(lines)
          EOF
        env:
          ROOM: ${{ github.event.inputs.room_name }}
          FILENAME: ${{ steps.script.outputs.filename }}
          R_TYPE: ${{ github.event.inputs.room_type == 'CTF (Challenge)' && 'CTF' || 'Walkthrough' }}
          DIFF: ${{ github.event.inputs.difficulty }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI-generated smart writeup for ${{ github.event.inputs.room_name }}" || echo "No changes to commit"
          git push
