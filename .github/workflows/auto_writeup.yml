name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Generate Smart Writeup via Free AI
        id: ai
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import json

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")

          # Формируем умный промпт для нейросети
          prompt = f"""
          You are an expert cybersecurity technical writer. Write a professional, detailed, and clean Markdown writeup for the TryHackMe room: '{room_name}'.
          Room Type: {room_type}
          Difficulty: {room_diff}
          Date: {import_datetime := __import__('datetime').datetime.now().strftime('%Y-%m-%d')}

          Based on the following raw text/dump from the room, extract key concepts, tools used, steps taken, and commands. Make it structured, highly readable, and professional for a GitHub portfolio.
          Include a beautiful Markdown Metadata table at the top.
          For flags or answers, use placeholder formats like `THM{{REDACTED}}` or `[REDACTED]`.

          --- RAW ROOM DATA START ---
          {room_dump}
          --- RAW ROOM DATA END ---

          Output ONLY the clean Markdown content, starting directly with the title (# TryHackMe: ...). Do not wrap the whole response in triple backticks.
          """

          print("[*] Contacting Free AI Endpoint...")
          
          # Используем стабильный публичный эндпоинт без авторизации
          try:
              response = requests.post(
                  "https://chateverywhere.app/api/chat/", # Или аналогичный открытый бесплатный API
                  headers={"Content-Type": "application/json"},
                  json={
                      "model": "gpt-4o-mini",
                      "messages": [{"role": "user", "content": prompt}]
                  },
                  timeout=60
              )
              
              if response.status_code == 200:
                  result = response.text
                  # Если API возвращает JSON, извлекаем текст. Если чистый текст - берем его.
                  try:
                      result = response.json()["choices"][0]["message"]["content"]
                  except:
                      pass
              else:
                  raise Exception(f"API Error {response.status_code}")
          except Exception as e:
              print(f"[!] AI API failed ({e}), falling back to offline fallback template...")
              # Фолбэк на случай, если бесплатный сервер перегружен
              result = f"# TryHackMe: {room_name}\n\n| Metadata | Value |\n| --- | --- |\n| **Type** | {room_type} |\n| **Difficulty** | {room_diff} |\n\n## Overview\nRoom text analysis completed. Review data manually."

          # Создаем чистое имя файла
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)

          # Передаем имя файла дальше в GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f"filename={filename}\n")
          EOF

      - name: Update README Table
        run: |
          ROOM="${{ github.event.inputs.room_name }}"
          FILENAME="${{ steps.ai.outputs.filename }}"
          DATE=$(date +'%Y-%m-%d')
          DIFF="${{ github.event.inputs.difficulty }}"
          TYPE="${{ github.event.inputs.room_type }}"
          
          if [ "$TYPE" = "CTF (Challenge)" ]; then R_TYPE="CTF"; else R_TYPE="Walkthrough"; fi
          
          NEW_ROW="| $DATE | [$ROOM]($FILENAME) | \`TryHackMe\` | \`$R_TYPE\` | \`$DIFF\` | ✅ Completed |"
          
          if [ ! -f README.md ]; then
            echo -e "# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |" > README.md
          fi
          
          sed -i "/| --- |/a $NEW_ROW" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "AI-generated smart writeup for ${{ github.event.inputs.room_name }}" || echo "No changes to commit"
          git push
