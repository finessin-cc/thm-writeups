name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'CTF'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Universal Writeup
        id: ai
        run: |
          ROOM="${{ github.event.inputs.room_name }}"
          TYPE="${{ github.event.inputs.room_type }}"
          DIFF="${{ github.event.inputs.difficulty }}"
          
          # Очищаем имя файла и заменяем пробелы на нижнее подчеркивание
          FILENAME=$(echo "$ROOM" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')
          FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9_.]//g').md
          
          if [ "$TYPE" = "CTF (Challenge)" ]; then
            cat <<EOF > "$FILENAME"
          # TryHackMe: $ROOM (CTF)
          
          | Metadata | Value |
          | :--- | :--- |
          | **Platform** | [TryHackMe](https://tryhackme.com/) |
          | **Room Type** | \`CTF / Challenge\` |
          | **Difficulty** | \`$DIFF\` |
          | **Date Completed** | $(date +'%Y-%m-%d') |
          
          ---
          
          ## 📝 Executive Summary
          This writeup covers the penetration testing methodology used to compromise the **$ROOM** machine.
          
          ## 🔍 Phase 1: Reconnaissance & Enumeration
          \`\`\`bash
          nmap -sC -sV -oN nmap_report \${TARGET_IP}
          \`\`\`
          
          ## 🚀 Phase 2: Exploitation
          > 🚩 **User Flag:** \`THM{REDACTED_USER_FLAG}\`
          
          ## 👑 Phase 3: Privilege Escalation
          > 🚩 **Root Flag:** \`THM{REDACTED_ROOT_FLAG}\`
          EOF
          else
            cat <<EOF > "$FILENAME"
          # TryHackMe: $ROOM (Walkthrough)
          
          | Metadata | Value |
          | :--- | :--- |
          | **Platform** | [TryHackMe](https://tryhackme.com/) |
          | **Room Type** | \`Walkthrough / Guided\` |
          | **Difficulty** | \`$DIFF\` |
          | **Date Completed** | $(date +'%Y-%m-%d') |
          
          ---
          
          ## 📖 Room Overview
          The **$ROOM** room is a guided educational walkthrough.
          
          ## 🧭 Guided Tasks & Answers
          ### 📑 Task 1
          * **Question:** Flag? -> \`THM{REDACTED_TASK_FLAG}\`
          EOF
          fi
          
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Update README Table
        run: |
          ROOM="${{ github.event.inputs.room_name }}"
          FILENAME="${{ steps.ai.outputs.filename }}"
          DATE=$(date +'%Y-%m-%d')
          DIFF="${{ github.event.inputs.difficulty }}"
          TYPE="${{ github.event.inputs.room_type }}"
          
          if [ "$TYPE" = "CTF (Challenge)" ]; then R_TYPE="CTF"; else R_TYPE="Walkthrough"; fi
          
          # Ссылка теперь ведет на файл прямо в корне репозитория (без writeups/)
          NEW_ROW="| $DATE | [$ROOM]($FILENAME) | \`TryHackMe\` | \`$R_TYPE\` | \`$DIFF\` | ✅ Completed |"
          
          if [ ! -f README.md ]; then
            echo -e "# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |" > README.md
          fi
          
          sed -i "/| --- |/a $NEW_ROW" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated writeup from GitHub Actions" || echo "No changes to commit"
          git push
