name: Generate Writeup Automatically

on:
  workflow_dispatch:
    inputs:
      room_name:
        description: 'Name of the TryHackMe Room'
        required: true
        type: string
      room_type:
        description: 'Type of the room'
        required: true
        default: 'Walkthrough (Guided/Theory)'
        type: choice
        options:
          - CTF (Challenge)
          - Walkthrough (Guided/Theory)
      difficulty:
        description: 'Difficulty level'
        required: false
        default: 'Easy'
        type: choice
        options:
          - Info / Intro
          - Easy
          - Medium
          - Hard
          - Insane
      room_dump:
        description: 'Paste copied text/dump from the THM room here'
        required: true
        type: string

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Local AI Engine (Ollama)
        run: |
          echo "[*] Installing Ollama locally..."
          curl -fsSL https://ollama.com/install.sh | sh
          
          echo "[*] Starting Ollama background service..."
          ollama serve > /dev/null 2>&1 &
          
          echo "[*] Waiting for server to wake up..."
          sleep 5
          
          echo "[*] Pulling smart developer model (Qwen 2.5 Coder)..."
          ollama pull qwen2.5-coder:1.5b

      - name: Generate Smart Writeup via Local AI
        id: script
        env:
          ROOM_NAME: ${{ github.event.inputs.room_name }}
          ROOM_TYPE: ${{ github.event.inputs.room_type }}
          ROOM_DIFF: ${{ github.event.inputs.difficulty }}
          ROOM_DUMP: ${{ github.event.inputs.room_dump }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import json
          from datetime import datetime

          room_name = os.getenv("ROOM_NAME")
          room_type = os.getenv("ROOM_TYPE")
          room_diff = os.getenv("ROOM_DIFF")
          room_dump = os.getenv("ROOM_DUMP")
          current_date = datetime.now().strftime('%Y-%m-%d')

          # Точные указания для локальной модели
          system_instruction = (
              "You are an Expert Cyber Security Analyst. Your job is to analyze the provided raw TryHackMe room data dump "
              "and write a highly detailed, comprehensive markdown writeup. "
              "Do not use generic templates or placeholders like 'Summary of topics'. "
              "Extract real logs, commands, questions, and specific details from the text. "
              "Format everything cleanly using markdown headers, bullet points, tables, and code blocks. "
              "Keep sensitive answers or flags redacted using standard format like THM{REDACTED}."
          )

          prompt_content = (
              f"Create a deep technical markdown walkthrough report for TryHackMe room: '{room_name}'.\n"
              f"Metadata: Type={room_type}, Difficulty={room_diff}, Date={current_date}.\n\n"
              f"Analyze this raw room dump and extract every single detail, task description, log, and question into the report:\n"
              f"--- RAW DATA DUMP ---\n{room_dump}\n---------------------\n"
              f"Output ONLY clean markdown starting with # TryHackMe: {room_name}."
          )

          print("[*] Sending dump to your local AI engine...")
          
          result = None
          try:
              # Отправляем запрос на локальный хост виртуалки
              response = requests.post(
                  "http://127.0.0.1:11434/api/generate",
                  json={
                      "model": "qwen2.5-coder:1.5b",
                      "prompt": f"{system_instruction}\n\n{prompt_content}",
                      "stream": False,
                      "options": {
                          "temperature": 0.2,
                          "num_ctx": 8192  # Расширяем контекст, чтобы влез большой дамп логов
                      }
                  },
                  timeout=180
              )
              if response.status_code == 200:
                  result = response.json().get("response", "").strip()
                  print("[+] Local AI successfully generated a customized writeup!")
          except Exception as e:
              print(f"[-] Local AI generation failed: {e}")

          if not result:
              result = f"# TryHackMe: {room_name}\n\n| Metadata | Value |\n| --- | --- |\n| **Status** | Local Engine Error |\n"

          # Имя файла
          filename = room_name.lower().replace(" ", "_")
          filename = "".join(c for c in filename if c.isalnum() or c in "._-") + ".md"

          with open(filename, "w", encoding="utf-8") as f:
              f.write(result)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as go:
              go.write(f"filename={filename}\n")
          EOF

      - name: Update README Table
        run: |
          python3 - << 'EOF'
          import os
          from datetime import datetime

          room = os.getenv("ROOM")
          filename = os.getenv("FILENAME")
          r_type = os.getenv("R_TYPE")
          diff = os.getenv("DIFF")
          current_date = datetime.now().strftime('%Y-%m-%d')

          new_row = f"| {current_date} | [{room}]({filename}) | `TryHackMe` | `{r_type}` | `{diff}` | ✅ Completed |"
          readme_path = "README.md"

          if not os.path.exists(readme_path):
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write("# Cybersec Journey\n\n| Date | Room | Platform | Type | Difficulty | Status |\n| --- | --- | --- | --- | --- | --- |\n")

          with open(readme_path, "r", encoding="utf-8") as f:
              lines = f.readlines()

          inserted = False
          for i, line in enumerate(lines):
              if "| --- |" in line:
                  lines.insert(i + 1, new_row + "\n")
                  inserted = True
                  break

          if not inserted:
              lines.append("\n" + new_row + "\n")

          with open(readme_path, "w", encoding="utf-8") as f:
              f.writelines(lines)
          EOF
        env:
          ROOM: ${{ github.event.inputs.room_name }}
          FILENAME: ${{ steps.script.outputs.filename }}
          R_TYPE: ${{ github.event.inputs.room_type == 'CTF (Challenge)' && 'CTF' || 'Walkthrough' }}
          DIFF: ${{ github.event.inputs.difficulty }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Writeup generated by local AI for ${{ github.event.inputs.room_name }}" || echo "No changes to commit"
          git push
